bundle:
  name: shogi-kif-rag
  engine: direct

include:
  - dbx_bundle/resources/workflows/*.yml
  - dbx_bundle/resources/volumes/*.yml

artifacts:
  default:
    type: whl
    build: uv build --wheel

sync:
  exclude:
    - src/**
    - tests/**
    - scripts/**
    - docs/**
    - dist/**
    - data/**
    - .github/**
    - .agents/**
    - "*.md"
    - ".*"
    - "*.lock"
    - "*.yml"
    - "*.toml"
    - "*.ini"

variables:
  catalog:
    description: The catalog to use
    default: "shogi"
  bronze_schema:
    description: The schema to use
    default: "shogi_bronze"
  silver_schema:
    description: The schema to use
    default: "shogi_silver"
  gold_schema:
    description: The schema to use
    default: "shogi_gold"
  test_schema:
    description: "integration test用のスキーマ"
    default: "test"
  wheel_version:
    description: "shogi_kif_rag wheel version. pyproject.tomlのversionと一致させること"
    default: "0.1.0"
  wheel_artifact_dir:
    description: "wheelが配置されるVolumeディレクトリ"
    default: "/Volumes/shogi/artifacts/wheels"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      artifact_path: /Volumes/shogi/artifacts/wheels/${workspace.current_user.short_name}
    variables:
      wheel_artifact_dir: /Volumes/shogi/artifacts/wheels/${workspace.current_user.short_name}/.internal

  test:
    # mode: development を削除 スキーマ名へのプレフィックスが付与を回避
    presets:
      pipelines_development: true   # pipelinesに、開発環境用の設定を適用
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      artifact_path: /Volumes/shogi/artifacts/wheels/${workspace.current_user.short_name}
    variables:
      wheel_artifact_dir: /Volumes/shogi/artifacts/wheels/${workspace.current_user.short_name}/.internal
      catalog: "shogi_test"

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      artifact_path: /Volumes/shogi/artifacts/wheels
