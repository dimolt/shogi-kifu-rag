bundle:
  name: shogi-kifu-rag

include:
  - databricks/resources/workflows/*.yml

artifacts:
  default:
    type: whl
    build: uv build --wheel

sync:
  paths:
    - src
    - databricks

variables:
  catalog:
    description: The catalog to use
    default: "shogi"
  bronze_schema:
    description: The schema to use
    default: "shogi_bronze"
  silver_schema:
    description: The schema to use
    default: "shogi_silver"
  gold_schema:
    description: The schema to use
    default: "shogi_gold"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
