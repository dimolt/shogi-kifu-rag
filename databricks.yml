bundle:
  name: shogi-kif-rag
  engine: direct

include:
  - dbx_bundle/resources/workflows/*.yml

artifacts:
  default:
    type: whl
    build: uv build --wheel

sync:
  exclude:
    - src/**
    - tests/**
    - scripts/**
    - docs/**
    - dist/**
    - data/**
    - .github/**
    - .agents/**
    - "*.md"
    - ".*"
    - "*.lock"
    - "*.yml"
    - "*.toml"
    - "*.ini"

variables:
  catalog:
    description: The catalog to use
    default: "shogi"
  landing_schema:
    description: The schema to use
    default: "landing"
  bronze_schema:
    description: The schema to use
    default: "shogi_bronze"
  silver_schema:
    description: The schema to use
    default: "shogi_silver"
  gold_schema:
    description: The schema to use
    default: "shogi_gold"
  test_schema:
    description: "integration test用のスキーマ"
    default: "test"
  wheel_version:
    description: "shogi_kif_rag wheel version. pyproject.tomlのversionと一致させること"
    default: "0.1.0"
  wheel_artifact_dir:
    description: "wheelが配置されるVolumeディレクトリ。setup/init_catalog.sqlで事前にVolumeを作成しておくこと"
    default: "/Volumes/${var.catalog}/artifacts/whl"
  wheel_dependencies:
    description: "shogi_kif_rag wheelタスク共通の依存関係"
    type: complex
    default:
      - "${workspace.artifact_path}/.internal/shogi_kif_rag-${var.wheel_version}-py3-none-any.whl"
      - chromadb
      - sentence_transformers
targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      artifact_path: ${var.wheel_artifact_dir}/${workspace.current_user.short_name}
    variables:
      catalog: "shogi_dev"

  test:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      artifact_path: ${var.wheel_artifact_dir}/${workspace.current_user.short_name}
    variables:
      catalog: "shogi_test"
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
      artifact_path: ${var.wheel_artifact_dir}
    variables:
      catalog: "shogi"