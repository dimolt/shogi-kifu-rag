bundle:
  name: shogi-kifu-rag

variables:
  catalog:
    description: The catalog to use
    default: "shogi"
  bronze_schema:
    description: The schema to use
    default: "shogi_bronze"
  silver_schema:
    description: The schema to use
    default: "shogi_silver"
  gold_schema:
    description: The schema to use
    default: "shogi_gold"

include:
  - infrastructure/resources/workflows/*.yml

sync:
  paths:
    - code

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
