bundle:
  name: shogi-kifu-rag

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

include:
  - infrastructure/resources/workflows/*.yml

sync:
  paths:
    - code

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: shogi
      schema: dev

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: shogi
      schema: prod
