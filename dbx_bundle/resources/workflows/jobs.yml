resources:
  jobs:
    shogi_kif_rag_main_job:
      name: shogi_kif_rag_main_job
      parameters:
        - name: catalog
          default: ${var.catalog}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies: ${var.wheel_dependencies}
      tasks:
        - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}
          depends_on: []

        - task_key: gold_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}
          depends_on: 
            - task_key: silver_pipeline

        - task_key: floodgate
          environment_key: default
          max_retries: 0
          disable_auto_optimization: true
          python_wheel_task:
            package_name: shogi-kif-rag
            entry_point: floodgate
            named_parameters:
              catalog: "{{job.parameters.catalog}}"
              silver_schema: ${var.silver_schema}

        - task_key: wikipedia
          environment_key: default
          max_retries: 0
          disable_auto_optimization: true
          python_wheel_task:
            package_name: shogi-kif-rag
            entry_point: wikipedia
            named_parameters:
              catalog: "{{job.parameters.catalog}}"
              silver_schema: ${var.silver_schema}