resources:
  pipelines:
    silver_pipeline:
      name: silver_pipeline
      root_path: ../..
      configuration:
        bundle.catalog: "${var.catalog}"  # 予約語 catalogとの衝突を回避
        bundle.landing_schema: "${var.landing_schema}"
      libraries:
        - glob:
            include: ../../pipelines/silver_table.py
        - glob:
            include: ../../pipelines/silver_transforms.py
        - glob:
            include: ../../utils/csv_utils.py
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.silver_schema}"
      serverless: true

    gold_pipeline:
      name: gold_pipeline
      configuration:
        bundle.catalog: "${var.catalog}"  # 予約語 catalogとの衝突を回避
        bundle.silver_schema: "${var.silver_schema}"
      libraries:
        - glob:
            include: ../../pipelines/gold_table.py
        - glob:
            include: ../../pipelines/gold_transforms.py
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.gold_schema}"
      serverless: true
