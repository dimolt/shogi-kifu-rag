[project]
name = "ShogiApp"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12,<3.13"

dependencies = [
    "python-shogi",
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
]

[dependency-groups]
local = [
    "pyspark",
]

remote = [
    "databricks-connect>=15.4,<15.5",
    "chromadb",
    "sentence-transformers",
    "requests",
    "beautifulsoup4",
    "gradio",
    "google-generativeai",
    "groq",
]

dev = [
    "pytest",
    "ruff",
    "mypy",
    "ipykernel",
]

[tool.uv]
package = false