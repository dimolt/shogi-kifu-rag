resources:
  pipelines:
    silver_pipeline:
      name: silver_pipeline
      libraries:
        - glob:
            include: ../../pipelines/silver_table.py
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.silver_schema}"
      serverless: true

    gold_pipeline:
      name: gold_pipeline
      configuration:
        catalog: "${var.catalog}"
        silver_schema: "${var.silver_schema}"
      libraries:
        - glob:
            include: ../../pipelines/gold_table.py
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.gold_schema}"
      serverless: true
