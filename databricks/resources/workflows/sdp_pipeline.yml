resources:
  pipelines:
    silver_pipeline:
      name: silver_pipeline
      libraries:
        - glob:
            include: ../../pipelines/silver_table.py
      environment:
        dependencies:
          - "${workspace.root_path}/artifacts/.internal/shogi_kif_rag-0.1.0-py3-none-any.whl"
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.silver_schema}"
      serverless: true

    gold_pipeline:
      name: gold_pipeline
      configuration:
        catalog: "${var.catalog}"
        silver_schema: "${var.silver_schema}"
      libraries:
        - glob:
            include: ../../pipelines/gold_table.py
      environment:
        dependencies:
          - "${workspace.root_path}/artifacts/.internal/shogi_kif_rag-0.1.0-py3-none-any.whl"
      photon: true
      catalog: "${var.catalog}"
      schema: "${var.gold_schema}"
      serverless: true
