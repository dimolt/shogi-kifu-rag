name: CD

on:
  push:
    tags:
      - 'v*.*.*-test'
      - 'v*.*.*'

jobs:
  deploy-test:
    name: Deploy to test
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-test')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: test
    concurrency:
      group: deploy-test
      cancel-in-progress: false

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group dbx --group rag --group web --group ui --group llm --group devTools'

      - name: Setup Databricks CLI
        uses: ./.github/actions/setup-databricks-cli

      - name: Validate bundle (test)
        run: databricks bundle validate -t test

      - name: Deploy to test
        run: databricks bundle deploy -t test

      - name: Run E2E tests
        timeout-minutes: 15
        run: uv run pytest tests/e2e/ -v

  deploy-prod:
    name: Deploy to prod
    if: startsWith(github.ref, 'refs/tags/v') && !endsWith(github.ref, '-test')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group dbx --group rag --group web --group ui --group llm --group devTools'

      - name: Setup Databricks CLI
        uses: ./.github/actions/setup-databricks-cli

      - name: Validate bundle (prod)
        run: databricks bundle validate -t prod

      - name: Deploy to prod
        run: databricks bundle deploy -t prod