name: CD

on:
  push:
    tags:
      - 'v*.*.*-dev'
      - 'v*.*.*'

jobs:
  deploy-dev:
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-dev')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group dbx --group rag --group web --group ui --group llm --group devTools'

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          uv run databricks bundle deploy -t dev

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v') && !endsWith(github.ref, '-dev')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group dbx --group rag --group web --group ui --group llm --group devTools'

      - name: Deploy to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          uv run databricks bundle deploy -t prod
