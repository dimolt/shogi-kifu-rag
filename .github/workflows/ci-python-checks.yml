name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: python-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group pyspark --group devTools --group web --group rag'

      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group pyspark --group devTools --group web --group rag'

      - name: Run Ruff
        run: |
          uv run ruff check .

  type-check:
    name: mypy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group pyspark --group devTools --group web --group rag'

      - name: Run mypy
        run: |
          uv run mypy src/ --exclude 'tests'