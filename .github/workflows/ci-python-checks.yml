name: CI

on:
  pull_request:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          groups: '--group pyspark --group devTools --group web --group rag'
      
      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v

      - name: Run Ruff
        run: |
          uv run ruff check .

      - name: Run mypy
        run: |
          uv run mypy src/ --exclude 'tests'