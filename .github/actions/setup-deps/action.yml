name: 'Setup Dependencies'

description: 'Install Python, uv, and sync dependencies with specified groups'

inputs:
  groups:
    required: true
    type: string
    description: 'Space-separated list of dependency groups'

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      shell: bash
      run: |
        uv sync --frozen ${{ inputs.groups }}
